# Liquid War 5 GPU RL trainer (PPO self-play).
#
# Single GPU Deployment running rl/train.py. Requests one nvidia.com/gpu and
# pins to a GPU node. Pure torch — no C engine, no Kafka required (metrics
# publish is optional, off unless bootstrapServers/schemaRegistry are set).

# Target namespace (injected by the ArgoCD app's helm.valuesObject).
namespace: liquidwar

nameOverride: ""

image:
  # Pull via pandoras-box.local:5000 — the ONLY registry host the nodes'
  # registries.yaml trusts (the in-cluster svc DNS x509-fails on kubelet pull;
  # same lesson as the cpu-worker chart).
  repository: pandoras-box.local:5000/pbox/liquidwar-gpu-trainer
  tag: "0.10.0-amd64"
  pullPolicy: IfNotPresent

# Exactly one trainer (single shared policy; self-play). Do not scale UP.
# 2026-06-10: re-enabled on the PRO 6000 (comfyui-pbox-* scaled to 0 in
# project-homer to free the card). 0.9.0 = the FLAT 25-action policy: every
# stance+mode pair (comet/lattice/nova/tide/binary/doom-levels/...) is in the
# action space, trained with --wells and --resume into a fixed NFS run dir so
# pod restarts continue in place. wells-080 (8-action) was superseded ~150
# updates in; its dir stays on the NFS for the record.
replicaCount: 1

# Pin to pbox (pandoras-box): its PRO 6000 (96 GB) is now advertised to k8s
# (nvidia-device-plugin affinity allowlist gained rtx_pro_6000) and the card is
# idle — every former MPS/ComfyUI client is gone. NOT broad arch:amd64 — the
# scheduler placed the pod on pandora-storm, whose GPU is squatted by the
# NON-k8s ollama qwen-tagger (~21 GB; the device plugin still advertises the
# card as free → the trainer CUDA-OOMs), and tank-a carries the Xid-79
# fall-off-bus fault. The PRO 6000's 96 GB also unblocks the larger batch size.
nodeSelector:
  kubernetes.io/hostname: pandoras-box

resources:
  requests:
    cpu: "2"
    memory: 4Gi
    nvidia.com/gpu: 1
  limits:
    cpu: "8"
    memory: 16Gi
    nvidia.com/gpu: 1

config:
  # PPO / env hyperparameters (passed as rl.train CLI args).
  device: cuda
  batchSize: 256          # 256 parallel games. The earlier 256-OOM was the
                          # LEARNER, not the sim: minibatch memory scales with
                          # batch/minibatches — 16 minibatches (was 4) cuts the
                          # peak alloc 4x, so double the games fit fine.
  minibatches: 16
  teams: 2                # duels, like play
  height: 80
  width: 110
  fighters: 500
  steps: 128
  updates: 5000
  lr: "0.0003"
  # 0.003, not the 0.01 default: the entropy bonus was tuned for the 8-action
  # head — at 25 actions it pinned the joint entropy at ~5.3/5.42 (near
  # uniform) for 1100+ updates and the eval win-rate whipsawed 0<->1. Smaller
  # bonus lets the policy actually commit.
  entCoef: "0.001"
  wells: true             # cast the REAL cross-team Doom/Maelstrom in training
  # Fixed run dir (relative to /opt/training, lands on the NFS mount): first
  # boot starts fresh in place, every restart after resumes policy+optimizer.
  resume: "results/rl/wells-100"
  # fresh run on the CONSOLIDATED physics (digestion-limited Doom, counter-
  # currents, all stance modes) + map-size curriculum; motor skills carry over
  # from wells-090 via warm start (same 25-action architecture)
  warmStart: "results/rl/wells-090/latest.pt"
  bigEvery: "5"
  # Kafka metrics (optional). Empty = no publishing.
  bootstrapServers: ""
  schemaRegistry: ""
