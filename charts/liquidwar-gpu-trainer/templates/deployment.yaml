apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lwgpu.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ include "lwgpu.fullname" . }}
    app.kubernetes.io/component: liquidwar-gpu-trainer
    app.kubernetes.io/part-of: liquidwar5-ai
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "lwgpu.fullname" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "lwgpu.fullname" . }}
        app.kubernetes.io/component: liquidwar-gpu-trainer
    spec:
      runtimeClassName: nvidia
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # ndots:1 — so kafka FQDNs resolve as-is (same fix as the other charts).
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      containers:
        - name: trainer
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # ENTRYPOINT is `python3 -m rl.train`; these args configure it.
          args:
            - "--device"
            - {{ .Values.config.device | quote }}
            - "--batch-size"
            - {{ .Values.config.batchSize | quote }}
            - "--teams"
            - {{ .Values.config.teams | quote }}
            - "--height"
            - {{ .Values.config.height | quote }}
            - "--width"
            - {{ .Values.config.width | quote }}
            - "--fighters"
            - {{ .Values.config.fighters | quote }}
            - "--steps"
            - {{ .Values.config.steps | quote }}
            - "--updates"
            - {{ .Values.config.updates | quote }}
            - "--lr"
            - {{ .Values.config.lr | quote }}
            {{- with .Values.config.bootstrapServers }}
            - "--bootstrap-servers"
            - {{ . | quote }}
            {{- end }}
            {{- with .Values.config.schemaRegistry }}
            - "--schema-registry"
            - {{ . | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
