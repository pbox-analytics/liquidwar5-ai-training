apiVersion: apps/v1
kind: Deployment
metadata:
  name: liquidwar-play
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: liquidwar-play
    app.kubernetes.io/part-of: liquidwar5-ai
spec:
  # single GPU -> kill the old pod before creating the new (else GPU deadlock)
  strategy:
    type: Recreate
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: liquidwar-play
  template:
    metadata:
      labels:
        app.kubernetes.io/name: liquidwar-play
    spec:
      {{- if .Values.gpu.enabled }}
      # The engine step (gradient spread, torch fallback) is CPU-bound for one
      # live game and pegs all cores -> sluggish frame rate. Run it on a free
      # GPU (sub-ms steps). Separate card from the PRO 6000 trainer = no
      # contention. nvidia.com/gpu:1 is requested via .Values.resources.
      runtimeClassName: nvidia
      nodeSelector:
        kubernetes.io/hostname: {{ .Values.gpu.node }}
      {{- end }}
      containers:
        - name: play
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Override the image's rl.train entrypoint: run the websocket server.
          command: ["uvicorn", "web.server:app", "--host", "0.0.0.0", "--port", "8080"]
          workingDir: /opt/training
          env:
            - { name: PYTHONPATH, value: /opt/training }
            - { name: LW_CKPT_DIR, value: /opt/training/results }   # NFS mount
            - { name: LW_PLAY_DEVICE, value: {{ .Values.playDevice | quote }} }
          ports:
            - { name: http, containerPort: 8080 }
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - { name: checkpoints, mountPath: /opt/training/results, readOnly: true }
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: checkpoints
          nfs:
            server: {{ .Values.ckptNfs.server }}
            path: {{ .Values.ckptNfs.path }}
