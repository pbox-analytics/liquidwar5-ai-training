<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Liquid War — play the AI</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; background: #0b0e14; color: #cdd6f4;
         font: 14px/1.4 ui-sans-serif, system-ui, sans-serif;
         display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 16px; }
  h1 { font-size: 16px; font-weight: 600; margin: 0; letter-spacing: .3px; }
  #hud { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; justify-content: center; }
  #hud .pill { background: #161b27; border: 1px solid #232a3a; border-radius: 8px; padding: 5px 10px;
               white-space: nowrap; }
  /* Fixed-width numeric values so changing digits never reflow the toolbar. */
  #hud .pill b { display: inline-block; text-align: right; font-variant-numeric: tabular-nums; }
  #tick { min-width: 5ch } #fps { min-width: 4ch } #flood { min-width: 3ch } #spread { min-width: 7ch }
  #mapname { min-width: 7ch; text-align: left }
  #stancePill { display: inline-block; min-width: 9ch; text-align: center; font-weight: 700 }
  #spinPill { display: inline-block; min-width: 8ch; text-align: center }
  #teams { font-variant-numeric: tabular-nums }
  #teams { display: flex; gap: 8px; }
  #teams .t { display: flex; align-items: center; gap: 5px; }
  #teams .swatch { width: 12px; height: 12px; border-radius: 3px; }
  button, select { background: #1b2233; color: #cdd6f4; border: 1px solid #2a3550;
                   border-radius: 8px; padding: 6px 10px; cursor: pointer; }
  canvas { background: #05070c; border: 1px solid #232a3a; border-radius: 8px;
           image-rendering: pixelated; max-width: 95vw; height: auto; cursor: crosshair; }
  .muted { color: #6b7280; }
</style>
</head>
<body>
  <h1>Liquid War — <span id="modeLabel">play</span> vs <span id="opp" class="muted">…</span></h1>
  <div id="hud">
    <span class="pill">tick <b id="tick">0</b></span>
    <span class="pill">fps <b id="fps">—</b></span>
    <span class="pill">flood <b id="flood">—</b>%</span>
    <span class="pill">spread <b id="spread">—</b></span>
    <span class="pill">map <b id="mapname">—</b></span>
    <span class="pill" id="stancePill">Swarm</span>
    <span class="pill" id="spinPill">spin ↻</span>
    <span class="pill" id="teams"></span>
    <select id="mode">
      <option value="play">Play (you = team 0)</option>
      <option value="spectate">Spectate (AI vs AI)</option>
    </select>
    <select id="opponent">
      <option value="latest">Latest checkpoint</option>
      <option value="heuristic">Heuristic AI</option>
    </select>
    <select id="mapsel" title="Pick the map (Random = a fresh one each game)">
      <option value="-1">Map: Random</option>
      <option value="0">Map: Open</option>
      <option value="1">Map: Barrier</option>
      <option value="2">Map: Pillars</option>
      <option value="3">Map: Scatter</option>
      <option value="4">Map: Rooms</option>
      <option value="5">Map: Corners</option>
    </select>
    <button id="reset">New game</button>
  </div>
  <canvas id="c" width="110" height="80"></canvas>
  <div class="muted" style="text-align:center; line-height:1.8;">
    <b>↑ ↓ ← → / WASD</b> steer (or hold mouse) &nbsp;·&nbsp;
    <b>Stances</b> (hold one): <b>1</b> 🐝 Swarm &nbsp; <b>2</b> 🌀 Spin &nbsp; <b>3</b> ➤ Drill &nbsp; <b>4</b> 🛡 Wall &nbsp; <b>5</b> 💥 Pulse &nbsp;·&nbsp;
    <b>Q</b>/<b>E</b> spin direction &nbsp;·&nbsp;
    <b>T</b> trails &nbsp;·&nbsp;
    <b>New game</b> / <b>Map</b> picker above
  </div>

<script>
const COLORS = ["#38e0e0","#ff5470","#4ade80","#fbbf24","#c084fc","#fb923c"]; // team 0 = you
const WALL = "#1a2030", EMPTY = "#05070c";
const cv = document.getElementById("c"), ctx = cv.getContext("2d");
const tmp = document.createElement("canvas"), tmpCtx = tmp.getContext("2d");  // offscreen units layer
let trails = true;   // motion trails: fade each frame so flow/swirl/undulation streak (toggle: T)
let particles = [];  // collision-spark particles {x,y,vx,vy,life,col} that fly out + fade
const MAXP = 1600;
let spin = 1;        // swarm orbit sign mirrored to the server (1 / -1 / 0)
function updateSpinPill() { document.getElementById("spinPill").textContent = "spin " + (spin === 1 ? "↻" : spin === -1 ? "↺" : "·"); }
function sendSpin() { if (ws && ws.readyState === 1) ws.send(JSON.stringify({ spin })); updateSpinPill(); }
let W = 110, H = 80, TEAMS = 4, target = null, ws = null, scale = 7;

function sizeCanvas() {
  scale = Math.max(4, Math.floor(Math.min(window.innerWidth * 0.95 / W, (window.innerHeight - 180) / H)));
  cv.style.width = (W * scale) + "px"; cv.style.height = (H * scale) + "px";
  cv.width = W; cv.height = H;
}

function render(st) {
  W = st.w; H = st.h; TEAMS = st.teams;
  if (cv.width !== W) sizeCanvas();
  const raw = atob(st.grid_b64), g = new Int8Array(raw.length);
  for (let i = 0; i < raw.length; i++) g[i] = (raw.charCodeAt(i) << 24) >> 24; // signed
  if (tmp.width !== W) { tmp.width = W; tmp.height = H; }
  // Units layer on an offscreen canvas: occupied cells opaque, EMPTY transparent
  // (so the faded trail shows through), walls solid.
  const img = tmpCtx.createImageData(W, H);
  const clash = [];                                       // contact-line cells (army vs army)
  for (let i = 0; i < g.length; i++) {
    const t = g[i];
    if (t === -1) { img.data[i*4+3] = 0; continue; }      // empty -> transparent
    let hex = t === -2 ? WALL : COLORS[t % COLORS.length];
    const r = parseInt(hex.slice(1,3),16), gg = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    img.data[i*4]=r; img.data[i*4+1]=gg; img.data[i*4+2]=b; img.data[i*4+3]=255;
    if (t >= 0) {                                         // a fighter touching an ENEMY team = collision
      const right = (i % W !== W - 1) ? g[i + 1] : -1;
      const down = (i + W < g.length) ? g[i + W] : -1;
      if ((right >= 0 && right !== t) || (down >= 0 && down !== t)) clash.push(i);
    }
  }
  tmpCtx.putImageData(img, 0, 0);
  // TRAILS: fade the previous frame, then composite the new units over it. The
  // fading lag turns the swirl into flow-streaks and the rim into a shimmering
  // undulating edge. (T toggles; lower alpha = longer trails.)
  ctx.fillStyle = trails ? "rgba(5,7,12,0.30)" : EMPTY;
  ctx.fillRect(0, 0, W, H);
  ctx.drawImage(tmp, 0, 0);
  // COLLISION FX: a faint front marker + real SPARKS that fly out from the clash,
  // arc (slight gravity), slow, and fade — white-hot at birth, cooling to the team
  // colour. With trails on they streak like embers off the battle line.
  if (clash.length) {
    ctx.globalCompositeOperation = "lighter";
    ctx.globalAlpha = 0.35;                                  // subtle team-tinted front glow
    for (const i of clash) { ctx.fillStyle = COLORS[g[i] % COLORS.length]; ctx.fillRect((i % W) - 1, ((i / W) | 0) - 1, 3, 3); }
    ctx.globalAlpha = 1; ctx.globalCompositeOperation = "source-over";
    for (const i of clash) {                                 // emit sparks sparingly
      if (particles.length >= MAXP || Math.random() > 0.05) continue;
      const a = Math.random() * 6.283, sp = 0.5 + Math.random() * 1.3;
      particles.push({ x: (i % W) + 0.5, y: ((i / W) | 0) + 0.5,
                       vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 0.3,
                       life: 1, col: COLORS[g[i] % COLORS.length] });
    }
  }
  if (particles.length) {                                   // travel, drag, gravity, fade
    ctx.globalCompositeOperation = "lighter";
    const next = [];
    for (const p of particles) {
      p.x += p.vx; p.y += p.vy; p.vx *= 0.95; p.vy = p.vy * 0.95 + 0.03; p.life -= 0.022;
      if (p.life <= 0 || p.x < 0 || p.x >= W || p.y < 0 || p.y >= H) continue;
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.life > 0.7 ? "#ffffff" : p.col;      // white-hot -> team colour as it cools
      ctx.fillRect(p.x - 0.7, p.y - 0.7, 1.8, 1.8);
      next.push(p);
    }
    particles = next;
    ctx.globalAlpha = 1; ctx.globalCompositeOperation = "source-over";
  }
  // cursors — glow + pulsate so they never get lost in the swarm. Player (team 0)
  // is bigger, and flares yellow during a Pulse.
  const beat = 1 + 0.3 * Math.sin(performance.now() / 170);
  st.cursors.forEach((c, t) => {
    if (!st.alive[t]) return;
    const col = COLORS[t % COLORS.length];
    const cx = c[1] + .5, cy = c[0] + .5;
    const surge = (t === 0 && st.pulse_active) ? 1.7 : 1;
    const R = (t === 0 ? 3.6 : 2.7) * beat * surge;
    ctx.globalAlpha = 0.22; ctx.strokeStyle = col; ctx.lineWidth = 2.6;
    ctx.beginPath(); ctx.arc(cx, cy, R * 1.45, 0, 7); ctx.stroke();      // soft glow halo
    ctx.globalAlpha = 0.75; ctx.lineWidth = 1.3;
    ctx.beginPath(); ctx.arc(cx, cy, R, 0, 7); ctx.stroke();            // main team ring
    ctx.globalAlpha = 1;
    ctx.strokeStyle = (t === 0 && st.pulse_active) ? "#fde047" : "#fff"; ctx.lineWidth = 0.7;
    ctx.beginPath(); ctx.arc(cx, cy, R * 0.5, 0, 7); ctx.stroke();      // bright inner ring
    ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(cx, cy, 1.0, 0, 7); ctx.fill();  // center dot
  });
  ctx.globalAlpha = 1;
  if (st.pulse_active) {                                                // Pulse screen flash
    ctx.strokeStyle = "#fde047"; ctx.lineWidth = 2;
    ctx.strokeRect(1, 1, W - 2, H - 2);
  }
  document.getElementById("tick").textContent = st.tick;
  document.getElementById("fps").textContent = st.fps ?? "—";
  document.getElementById("flood").textContent = st.flood_pct ?? "—";
  document.getElementById("spread").textContent = st.spread ? st.spread.map(s => Math.round(s)).join("/") : "—";
  document.getElementById("mapname").textContent = st.map ?? "—";
  const sp = document.getElementById("stancePill");
  const SC = { Swarm: "#1b2233", Spin: "#0c3a4a", Drill: "#5a3a0c", Wall: "#14401f", Pulse: "#3a1040" };
  const SI = { Swarm: "🐝", Spin: "🌀", Drill: "➤", Wall: "🛡", Pulse: "💥" };
  sp.textContent = (SI[st.stance] || "") + " " + (st.stance ?? "—");
  sp.style.background = SC[st.stance] || "#1b2233"; sp.style.color = "#fff";
  document.getElementById("opp").textContent = st.opponent;
  const tdiv = document.getElementById("teams"); tdiv.innerHTML = "";
  st.fighters.forEach((f, t) => {
    const el = document.createElement("span"); el.className = "t";
    el.innerHTML = `<span class="swatch" style="background:${COLORS[t%COLORS.length]}"></span><span style="display:inline-block;min-width:4ch;text-align:right">${f}</span>`;
    if (!st.alive[t]) el.style.opacity = .35; tdiv.appendChild(el);
  });
}

function connect() {
  if (ws) ws.close();
  const mode = document.getElementById("mode").value;
  const opp = document.getElementById("opponent").value;
  document.getElementById("modeLabel").textContent = mode;
  ws = new WebSocket(`${location.protocol === "https:" ? "wss" : "ws"}://${location.host}/ws?mode=${mode}&opponent=${opp}&teams=2`);
  ws.onmessage = (e) => render(JSON.parse(e.data));   // server streams frames; just render
}

// Mouse is OPT-IN: it only steers while a button is held, so it doesn't fight
// the keyboard (which is the default control). Releasing stops steering.
let mouseDown = false;
function updateTarget(e) {
  const r = cv.getBoundingClientRect();
  target = [Math.floor((e.clientY - r.top) / scale), Math.floor((e.clientX - r.left) / scale)];
}
cv.addEventListener("mousedown", (e) => { mouseDown = true; updateTarget(e); });
window.addEventListener("mouseup", () => {
  if (mouseDown && ws && ws.readyState === 1) ws.send(JSON.stringify({ target: null }));
  mouseDown = false;
});
cv.addEventListener("mousemove", (e) => { if (mouseDown) updateTarget(e); });
setInterval(() => { if (ws && ws.readyState === 1 && mouseDown && target) ws.send(JSON.stringify({ target })); }, 50);

// Keyboard control (Arrow keys + WASD) — drives the cursor directly, LW-style.
// While any movement key is held it overrides the mouse; releasing all keys
// (dir = [0,0]) falls back to mouse homing.
const KEYS = { ArrowUp:0, ArrowDown:0, ArrowLeft:0, ArrowRight:0, w:0, a:0, s:0, d:0 };
function sendDir() {
  const up = KEYS.ArrowUp || KEYS.w, down = KEYS.ArrowDown || KEYS.s;
  const left = KEYS.ArrowLeft || KEYS.a, right = KEYS.ArrowRight || KEYS.d;
  const dir = [(down ? 1 : 0) - (up ? 1 : 0), (right ? 1 : 0) - (left ? 1 : 0)]; // +y = down
  if (ws && ws.readyState === 1) ws.send(JSON.stringify({ dir }));
}
window.addEventListener("keydown", (e) => {
  if (e.key >= "1" && e.key <= "5") {             // number row selects a held STANCE (0..4)
    if (ws && ws.readyState === 1) ws.send(JSON.stringify({ stance: parseInt(e.key) - 1 }));
    return;
  }
  if (e.key === "t" || e.key === "T") { trails = !trails; return; }   // toggle motion trails
  if (e.key === "q" || e.key === "Q") { spin = spin === -1 ? 0 : -1; sendSpin(); return; }  // orbit CCW / off
  if (e.key === "e" || e.key === "E") { spin = spin === 1 ? 0 : 1; sendSpin(); return; }    // orbit CW / off
  if (e.key in KEYS) { KEYS[e.key] = 1; e.preventDefault(); sendDir(); }
});
window.addEventListener("keyup",   (e) => { if (e.key in KEYS) { KEYS[e.key] = 0; e.preventDefault(); sendDir(); } });
document.getElementById("reset").onclick = () => ws && ws.send(JSON.stringify({reset:true}));
document.getElementById("mode").onchange = connect;
document.getElementById("opponent").onchange = connect;
document.getElementById("mapsel").onchange = () => {     // pick map -> tell server, start new game
  if (ws && ws.readyState === 1) ws.send(JSON.stringify({ map: parseInt(document.getElementById("mapsel").value) }));
};
window.addEventListener("resize", sizeCanvas);
sizeCanvas(); connect(); updateSpinPill();
</script>
</body>
</html>
