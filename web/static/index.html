<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Liquid War — play the AI</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; background: #0b0e14; color: #cdd6f4;
         font: 14px/1.4 ui-sans-serif, system-ui, sans-serif;
         display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 16px; }
  h1 { font-size: 16px; font-weight: 600; margin: 0; letter-spacing: .3px; }
  #hud { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; justify-content: center; }
  #hud .pill { background: #161b27; border: 1px solid #232a3a; border-radius: 8px; padding: 5px 10px; }
  #teams { display: flex; gap: 8px; }
  #teams .t { display: flex; align-items: center; gap: 5px; }
  #teams .swatch { width: 12px; height: 12px; border-radius: 3px; }
  button, select { background: #1b2233; color: #cdd6f4; border: 1px solid #2a3550;
                   border-radius: 8px; padding: 6px 10px; cursor: pointer; }
  canvas { background: #05070c; border: 1px solid #232a3a; border-radius: 8px;
           image-rendering: pixelated; max-width: 95vw; height: auto; cursor: crosshair; }
  .muted { color: #6b7280; }
</style>
</head>
<body>
  <h1>Liquid War — <span id="modeLabel">play</span> vs <span id="opp" class="muted">…</span></h1>
  <div id="hud">
    <span class="pill">tick <b id="tick">0</b></span>
    <span class="pill" id="teams"></span>
    <select id="mode">
      <option value="play">Play (you = team 0)</option>
      <option value="spectate">Spectate (AI vs AI)</option>
    </select>
    <select id="opponent">
      <option value="latest">Latest checkpoint</option>
      <option value="heuristic">Heuristic AI</option>
    </select>
    <button id="reset">New game</button>
  </div>
  <canvas id="c" width="110" height="80"></canvas>
  <div class="muted">Move your mouse over the board — your blob (team 0, cyan) flows toward the cursor.</div>

<script>
const COLORS = ["#38e0e0","#ff5470","#4ade80","#fbbf24","#c084fc","#fb923c"]; // team 0 = you
const WALL = "#1a2030", EMPTY = "#05070c";
const cv = document.getElementById("c"), ctx = cv.getContext("2d");
let W = 110, H = 80, TEAMS = 4, target = null, ws = null, scale = 7;

function sizeCanvas() {
  scale = Math.max(4, Math.floor(Math.min(window.innerWidth * 0.95 / W, (window.innerHeight - 180) / H)));
  cv.style.width = (W * scale) + "px"; cv.style.height = (H * scale) + "px";
  cv.width = W; cv.height = H;
}

function render(st) {
  W = st.w; H = st.h; TEAMS = st.teams;
  if (cv.width !== W) sizeCanvas();
  const raw = atob(st.grid_b64), g = new Int8Array(raw.length);
  for (let i = 0; i < raw.length; i++) g[i] = (raw.charCodeAt(i) << 24) >> 24; // signed
  const img = ctx.createImageData(W, H);
  for (let i = 0; i < g.length; i++) {
    let hex = g[i] === -2 ? WALL : g[i] === -1 ? EMPTY : COLORS[g[i] % COLORS.length];
    const r = parseInt(hex.slice(1,3),16), gg = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    img.data[i*4]=r; img.data[i*4+1]=gg; img.data[i*4+2]=b; img.data[i*4+3]=255;
  }
  ctx.putImageData(img, 0, 0);
  // cursors (draw a ring per team)
  st.cursors.forEach((c, t) => {
    if (!st.alive[t]) return;
    ctx.strokeStyle = COLORS[t % COLORS.length]; ctx.lineWidth = 0.6;
    ctx.beginPath(); ctx.arc(c[1] + .5, c[0] + .5, 1.6, 0, 7); ctx.stroke();
  });
  document.getElementById("tick").textContent = st.tick;
  document.getElementById("opp").textContent = st.opponent;
  const tdiv = document.getElementById("teams"); tdiv.innerHTML = "";
  st.fighters.forEach((f, t) => {
    const el = document.createElement("span"); el.className = "t";
    el.innerHTML = `<span class="swatch" style="background:${COLORS[t%COLORS.length]}"></span>${f}`;
    if (!st.alive[t]) el.style.opacity = .35; tdiv.appendChild(el);
  });
}

function connect() {
  if (ws) ws.close();
  const mode = document.getElementById("mode").value;
  const opp = document.getElementById("opponent").value;
  document.getElementById("modeLabel").textContent = mode;
  ws = new WebSocket(`${location.protocol === "https:" ? "wss" : "ws"}://${location.host}/ws?mode=${mode}&opponent=${opp}&teams=2`);
  ws.onmessage = (e) => render(JSON.parse(e.data));   // server streams frames; just render
}

cv.addEventListener("mousemove", (e) => {
  const r = cv.getBoundingClientRect();
  target = [Math.floor((e.clientY - r.top) / scale), Math.floor((e.clientX - r.left) / scale)];
});
// Push the latest cursor target to the server async (decoupled from the frame stream).
setInterval(() => { if (ws && ws.readyState === 1 && target) ws.send(JSON.stringify({ target })); }, 50);
document.getElementById("reset").onclick = () => ws && ws.send(JSON.stringify({reset:true}));
document.getElementById("mode").onchange = connect;
document.getElementById("opponent").onchange = connect;
window.addEventListener("resize", sizeCanvas);
sizeCanvas(); connect();
</script>
</body>
</html>
