apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: liquidwar-coordinator
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: liquidwar5-ai
  annotations:
    # After Kafka (wave 2) + schema-registry (wave 3); same wave as the
    # cpu-worker — both just need Kafka up.
    argocd.argoproj.io/sync-wave: "7"
spec:
  project: default
  source:
    # Self-hosted: the liquidwar deploy layer lives in this repo (full repo
    # independence from the data-platform / comfyui GitOps). targetRevision is
    # the repo default branch — on `main` (renamed from master).
    repoURL: https://github.com/pbox-analytics/liquidwar5-ai-training
    targetRevision: main
    path: charts/liquidwar-coordinator
    helm:
      valuesObject:
        namespace: liquidwar
  destination:
    server: https://kubernetes.default.svc
    namespace: liquidwar
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
