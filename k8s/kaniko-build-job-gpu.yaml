# In-cluster Kaniko build for the GPU RL trainer image.
#
# SINGLE-repo context (unlike the cpu-worker build): the GPU trainer is pure
# torch + simulator/ + rl/ — no engine repo needed. initContainer clones just
# liquidwar5-ai-training; Kaniko builds docker/Dockerfile.gpu-trainer and
# pushes to the in-cluster registry.
#
# The CUDA+torch image is large (~6GB); the build pulls the CUDA base + torch
# wheel, so allow several minutes. Build runs on any amd64 node (no GPU needed
# to BUILD — only to run). Bump name + ENGINE/destination tag per rebuild.
apiVersion: batch/v1
kind: Job
metadata:
  name: liquidwar-gpu-trainer-build-0001
  namespace: liquidwar
  labels:
    app.kubernetes.io/name: liquidwar-gpu-trainer
    app.kubernetes.io/component: image-build
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: liquidwar-gpu-trainer
        app.kubernetes.io/component: image-build
    spec:
      restartPolicy: Never
      nodeSelector:
        kubernetes.io/arch: amd64
      initContainers:
        - name: clone
          image: alpine/git:latest
          env:
            - name: TRAINING_REF
              value: "4ca9710"   # bump to the commit that has rl/ + Dockerfile.gpu-trainer
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eux
              cd /workspace
              git clone https://github.com/pandora-wolf-meow/liquidwar5-ai-training.git .
              git checkout "$TRAINING_REF"
              ls -la rl/ docker/Dockerfile.gpu-trainer
          volumeMounts:
            - { name: workspace, mountPath: /workspace }
      containers:
        - name: kaniko
          image: gcr.io/kaniko-project/executor:latest
          args:
            - "--context=dir:///workspace"
            - "--dockerfile=docker/Dockerfile.gpu-trainer"
            # Push via the in-cluster svc DNS (pod egress). This is the SAME
            # physical registry the chart pulls from as pandoras-box.local:5000
            # (the kubelet-trusted name) — two names, one registry, same as the
            # cpu-worker build. Push-here / pull-there is proven to work.
            - "--destination=registry.homer-ai.svc.cluster.local:5000/pbox/liquidwar-gpu-trainer:0.1.0-amd64"
            - "--skip-tls-verify"
            - "--cache=true"
            - "--cache-repo=registry.homer-ai.svc.cluster.local:5000/pbox/liquidwar-gpu-trainer-cache"
          volumeMounts:
            - { name: workspace, mountPath: /workspace }
          resources:
            requests: { cpu: "2", memory: 4Gi }
            limits:   { cpu: "6", memory: 8Gi }
      volumes:
        - name: workspace
          emptyDir: {}
