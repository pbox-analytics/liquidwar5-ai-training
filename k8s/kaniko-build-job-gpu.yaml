# In-cluster Kaniko build for the GPU RL trainer image.
#
# SINGLE-repo context: pure torch + simulator/ + rl/ — no engine repo. The
# initContainer clones liquidwar5-ai-training; Kaniko builds
# docker/Dockerfile.gpu-trainer and pushes to the in-cluster registry.
#
# The CUDA 12.8 + torch 2.7.0 image is ~6GB. Kaniko's filesystem snapshot of
# an image that large is MEMORY-HUNGRY — the first attempt OOMKilled at an 8Gi
# limit (exit 137 during "Taking snapshot of full filesystem"). Fixes here:
#   - memory limit raised to 24Gi (request 8Gi)
#   - --single-snapshot: one snapshot at the end instead of per-layer (much
#     less peak memory)
#   - --use-new-run: lower-overhead change detection
# Build runs on any amd64 node (no GPU needed to build). Bump the job name +
# TRAINING_REF per rebuild.
apiVersion: batch/v1
kind: Job
metadata:
  name: liquidwar-gpu-trainer-build-0008
  namespace: liquidwar
  labels:
    app.kubernetes.io/name: liquidwar-gpu-trainer
    app.kubernetes.io/component: image-build
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: liquidwar-gpu-trainer
        app.kubernetes.io/component: image-build
    spec:
      restartPolicy: Never
      nodeSelector:
        kubernetes.io/arch: amd64
      initContainers:
        - name: clone
          image: alpine/git:latest
          env:
            - name: TRAINING_REF
              value: "4b02892"   # wells-110 + inertia 0.12 + doom rebalance (parity)
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eux
              cd /workspace
              git clone https://github.com/pbox-analytics/liquidwar5-ai-training.git .
              git checkout "$TRAINING_REF"
              ls -la rl/ docker/Dockerfile.gpu-trainer
          volumeMounts:
            - { name: workspace, mountPath: /workspace }
      containers:
        - name: kaniko
          image: gcr.io/kaniko-project/executor:latest
          args:
            - "--context=dir:///workspace"
            - "--dockerfile=docker/Dockerfile.gpu-trainer"
            - "--destination=registry.homer-ai.svc.cluster.local:5000/pbox/liquidwar-gpu-trainer:0.11.0-amd64"
            - "--skip-tls-verify"
            - "--single-snapshot"
            - "--use-new-run"
            - "--cache=true"
            - "--cache-repo=registry.homer-ai.svc.cluster.local:5000/pbox/liquidwar-gpu-trainer-cache"
          volumeMounts:
            - { name: workspace, mountPath: /workspace }
          resources:
            requests: { cpu: "2", memory: 8Gi }
            limits:   { cpu: "6", memory: 24Gi }
      volumes:
        - name: workspace
          emptyDir: {}
